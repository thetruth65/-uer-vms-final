version: '3.8'

x-backend-base: &backend-base
  build: ./backend
  restart: always
  environment:
    - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@db:5432/electoral_system}
    - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
    - AI_SERVICE_URL=http://ai-service:8001
    - BLOCKCHAIN_SERVICE_URL=http://blockchain-service:5000
    - CORS_ORIGINS=*
  depends_on:
    - ai-service
    - blockchain-service

services:
  # -----------------------------------
  # Core Infrastructure
  # -----------------------------------
  blockchain-service:
    build: ./blockchain-service
    ports:
      - "5000:5000"
    restart: always

  ai-service:
    build: ./ai-service
    ports:
      - "8001:8001"
    restart: always
    deploy:
      resources:
        reservations:
          memory: 2G

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      - VITE_NODE_URLS=http://localhost:8000,http://localhost:8002,http://localhost:8004,http://localhost:8006,http://localhost:8008,http://localhost:8010,http://localhost:8012,http://localhost:8014,http://localhost:8016,http://localhost:8018,http://localhost:8020,http://localhost:8022,http://localhost:8024,http://localhost:8026,http://localhost:8028,http://localhost:8030,http://localhost:8032,http://localhost:8034,http://localhost:8036,http://localhost:8038,http://localhost:8040,http://localhost:8042,http://localhost:8044,http://localhost:8046,http://localhost:8048,http://localhost:8050,http://localhost:8052,http://localhost:8054
    depends_on:
      - state-a
      - state-b
      - state-c

  # -----------------------------------
  # 28 State Nodes
  # -----------------------------------
  state-a:
    <<: *backend-base
    ports: [ "8000:8000" ]
    environment:
      <<: *backend-base.environment
      STATE_ID: STATE_A
      STATE_NAME: Delhi

  state-b:
